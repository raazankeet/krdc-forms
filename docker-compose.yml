version: '3.8'

services:
  backend:
    build: ./backend
    container_name: glp-forms-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/glp_forms.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    command: >
      sh -c "alembic upgrade head && python seed_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: glp-forms-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npx vite --host 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
